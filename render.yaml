services:
  - type: web
    name: healthnexus
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromParam: APP_URL
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: healthnexus-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: healthnexus-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: healthnexus-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: healthnexus-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: healthnexus-db
          property: password

databases:
  - name: healthnexus-db
    plan: free
    databaseName: healthnexus
    user: healthnexus
